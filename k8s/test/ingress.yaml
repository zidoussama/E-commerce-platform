apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress
  namespace: test
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - host: test.ecomp.codes
    http:
      paths:
      - path: /api        # ← API traffic goes to backend
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3002
      - path: /           # ← everything else goes to frontend
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80